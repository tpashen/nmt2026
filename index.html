<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НМТ 2026: Математика - Тренажер</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .custom-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .progress-box { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border: 1px solid #d1d5db; transition: all 0.3s; cursor: pointer; background-color: white; color: #9ca3af; }
        .progress-answered { background-color: #3b82f6 !important; border-color: #2563eb !important; color: white !important; }
        .progress-correct { background-color: #10b981 !important; border-color: #059669 !important; color: white !important; }
        .progress-wrong { background-color: #ef4444 !important; border-color: #dc2626 !important; color: white !important; }
        .option-btn:hover:not(:disabled) { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="text-gray-800">

    <!-- Header -->
    <header class="bg-blue-600 text-white shadow-lg sticky-header">
        <div class="max-w-5xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-start">
                <div>
                    <h1 class="text-lg font-bold leading-tight">НМТ-2026: Математика</h1>
                    <div id="timer" class="text-blue-100 font-mono text-xl font-bold">60:00</div>
                </div>
                <!-- Кнопка тепер відкриває посилання у новій вкладці -->
                <a href="https://testportal.gov.ua/wp-content/uploads/2022/04/ZNO_Math_dovidkovy-materialy.pdf" target="_blank" class="bg-yellow-400 hover:bg-yellow-500 text-blue-900 font-bold py-2 px-4 rounded-lg text-sm transition-all flex items-center gap-2 shadow-md">
                    <i class="fas fa-external-link-alt"></i>
                    Довідкові матеріали
                </a>
            </div>
            <div class="flex flex-wrap gap-1.5 justify-center md:justify-end" id="progress-panel"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6">
        <!-- Intro Screen -->
        <div id="intro-card" class="bg-white rounded-2xl p-8 custom-shadow mb-8 text-center border-t-4 border-blue-500">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-stopwatch text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold mb-4">Пробне тестування</h2>
            <p class="text-gray-600 mb-6 italic">Довідкові матеріали відкриються у новій вкладці браузера.</p>
            <button onclick="startTest()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-12 rounded-xl transition-all shadow-lg text-lg">Розпочати тест</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-container" class="hidden">
            <div id="questions-list"></div>
            <div class="mt-8 flex flex-col items-center pb-20">
                <button onclick="finishTest()" id="finish-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-12 rounded-xl shadow-xl transition-all transform hover:scale-105">Завершити тест</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-card" class="hidden bg-white rounded-2xl p-10 custom-shadow text-center border-t-8 border-blue-500 mb-10">
            <h2 class="text-3xl font-bold mb-2">Тест завершено!</h2>
            <div id="score-display" class="text-7xl font-black text-blue-600 my-6">0 / 22</div>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition-all">Спробувати ще раз</button>
                <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-8 rounded-xl transition-all">Переглянути помилки</button>
            </div>
        </div>
    </main>

    <script>
        const quizData = [
            { 
                q: "На діаграмі відображено кількість глядачів у 5 залах кінотеатру протягом доби. За діаграмою визначте різницю між кількістю глядачів, які відвідали білу й зелену зали.", 
                a: ["20", "25", "30", "35", "55"], c: 3, r: "Біла (55) - Зелена (20) = 35.",
                svg: `<svg viewBox="0 0 400 200" class="w-full max-w-[400px] h-auto border rounded bg-white p-2">
                    <line x1="40" y1="20" x2="40" y2="160" stroke="black" />
                    <line x1="40" y1="160" x2="380" y2="160" stroke="black" />
                    <rect x="60" y="50" width="30" height="110" fill="#f8fafc" stroke="black" />
                    <rect x="120" y="70" width="30" height="90" fill="#3b82f6" stroke="black" />
                    <rect x="180" y="100" width="30" height="60" fill="#facc15" stroke="black" />
                    <rect x="240" y="120" width="30" height="40" fill="#22c55e" stroke="black" />
                    <rect x="300" y="130" width="30" height="30" fill="#18181b" stroke="black" />
                    <text x="55" y="180" font-size="12">біла</text><text x="235" y="180" font-size="12">зел.</text>
                    <text x="10" y="55" font-size="10">55</text><text x="10" y="125" font-size="10">20</text>
                </svg>`
            },
            { 
                q: "Драбина BC приставлена до вертикальної стіни AB. Кут ABC = 12°. Знайдіть кут BCA.", 
                a: ["18°", "72°", "78°", "82°", "90°"], c: 2, r: "90° - 12° = 78°.",
                svg: `<svg viewBox="0 0 200 150" class="w-full max-w-[200px] h-auto border rounded bg-white p-2">
                    <line x1="40" y1="20" x2="40" y2="120" stroke="black" stroke-width="2" />
                    <line x1="40" y1="120" x2="160" y2="120" stroke="gray" />
                    <line x1="40" y1="20" x2="160" y2="120" stroke="brown" stroke-width="3" />
                    <text x="30" y="20" font-weight="bold">B</text>
                    <text x="30" y="135" font-weight="bold">A</text>
                    <text x="165" y="130" font-weight="bold">C</text>
                    <path d="M40 40 Q55 40 55 35" fill="none" stroke="red" />
                    <text x="50" y="55" font-size="12" fill="red">12°</text>
                </svg>`
            },
            { q: "Відношення кількості столів до стільців 3:4. Якою може бути їх сумарна кількість?", a: ["72", "87", "91", "95", "100"], c: 2, r: "Сума має ділитися на 7. 91 / 7 = 13." },
            { q: "Визначте корінь рівняння log₃x = 2.", a: ["5", "6", "9", "√3", "2/3"], c: 2, r: "x = 3² = 9." },
            { q: "Висота конуса та його твірна лежать на прямих, що:", a: ["Паралельні", "Перпендикулярні", "Належать одній площині", "Мимобіжні", "Збігаються"], c: 2, r: "Перетинаються у вершині — лежать в одній площині." },
            { 
                q: "На одному з рисунків зображено ескіз графіка функції y = ax² + bx + c, де a > 0, D < 0. Укажіть цей рисунок.", 
                a: ["Гілки вниз", "Перетинає вісь x двічі", "Гілки вгору, не перетинає x", "Дотикається до x", "Вершина на осі y"], c: 2, r: "a > 0 (вгору), D < 0 (немає перетинів з Ox).",
                svg: `<svg viewBox="0 0 200 160" class="w-full max-w-[220px] h-auto border rounded bg-white p-2">
                    <line x1="10" y1="130" x2="190" y2="130" stroke="black" stroke-width="1" />
                    <line x1="100" y1="150" x2="100" y2="10" stroke="black" stroke-width="1" />
                    <path d="M40 30 Q100 120 160 30" fill="none" stroke="blue" stroke-width="2" />
                    <text x="185" y="145" font-size="10">x</text>
                    <text x="105" y="15" font-size="10">y</text>
                    <text x="90" y="142" font-size="10">0</text>
                </svg>`
            },
            { q: "Зняли 40% грошей, потім 500 грн. Залишилася половина (50%). Скільки було спочатку?", a: ["2500", "4000", "5000", "6000", "7500"], c: 2, r: "10% = 500 грн." },
            { q: "Координати вектора KL, якщо K(3;2;4), L(-1;2;0).", a: ["(4;0;4)", "(2;4;4)", "(2;0;-2)", "(-4;0;-4)", "(4;4;4)"], c: 3, r: "L - K = (-4; 0; -4)." },
            { q: "Обчисліть: ∛(2³) * √36.", a: ["8", "12", "72", "6√2", "24"], c: 1, r: "2 * 6 = 12." },
            { q: "Властивості медіани AM: I.BM=MC; II.AM - бісектриса; III.S(ABM)=S(ACM). Які правильні?", a: ["лише I", "I та II", "I та III", "I, II та III", "лише III"], c: 2, r: "Медіана ділить сторону і площу навпіл." },
            { q: "Скільки коренів cos x = 0 на проміжку [0; 2π]?", a: ["1", "2", "3", "0", "4"], c: 1, r: "π/2 та 3π/2." },
            { 
                q: "Укажіть формулу для обчислення площі фігури, обмеженої графіками функцій y = 2ˣ, y = 2 та x = 0.", 
                a: ["∫(2ˣ)dx від 0 до 2", "∫(2-2ˣ)dx від 0 до 1", "∫(2ˣ-2)dx від 0 до 1", "∫(2ˣ)dx від 0 до 1", "∫(2ˣ-2)dx від 0 до 2"], c: 1, r: "∫(2 - 2ˣ)dx від 0 до 1.",
                svg: `<svg viewBox="0 0 200 150" class="w-full max-w-[200px] h-auto border rounded bg-white p-2">
                    <line x1="30" y1="130" x2="180" y2="130" stroke="black" />
                    <line x1="40" y1="140" x2="40" y2="20" stroke="black" />
                    <line x1="30" y1="50" x2="160" y2="50" stroke="red" />
                    <path d="M40 110 Q80 100 120 20" fill="none" stroke="blue" />
                    <path d="M40 50 L40 110 Q60 105 76 50 Z" fill="rgba(0,0,255,0.1)" />
                    <text x="165" y="55" fill="red" font-size="10">y=2</text>
                    <text x="100" y="30" fill="blue" font-size="10">y=2ˣ</text>
                </svg>`
            },
            { q: "Розв'яжіть: x²+4≥0 та 2(3x-5)-6 < x+8.", a: ["(-∞; 4,8)", "∅", "[2; 4,8)", "[4,8; ∞)", "(-∞; 2]"], c: 0, r: "5x < 24 => x < 4,8." },
            { q: "Спростіть: (4x²-25) / (2x-5)².", a: ["(2x+5)/(2x-5)", "1", "2x+5", "-1", "(2x-5)/(2x+5)"], c: 0, r: "(2x+5)/(2x-5)." },
            { 
                q: "Кут ACB, вписаний у коло, дорівнює 30°. Довжина дуги AB, на яку він спирається, дорівнює 25 см. Визначте довжину цього кола.", 
                a: ["75", "150", "250", "300", "500"], c: 1, r: "Дуга 60° (1/6 кола). 25 * 6 = 150.",
                svg: `<svg viewBox="0 0 160 160" class="w-full max-w-[160px] h-auto border rounded bg-white p-2">
                    <circle cx="80" cy="80" r="60" fill="none" stroke="black" />
                    <line x1="80" y1="80" x2="132" y2="50" stroke="gray" />
                    <line x1="80" y1="80" x2="132" y2="110" stroke="gray" />
                    <path d="M132 50 A60 60 0 0 1 132 110" fill="none" stroke="red" stroke-width="3" />
                    <line x1="20" y1="80" x2="132" y2="50" stroke="blue" />
                    <line x1="20" y1="80" x2="132" y2="110" stroke="blue" />
                    <text x="15" y="85">C</text><text x="135" y="45">A</text><text x="135" y="125">B</text>
                    <text x="35" y="85" font-size="10">30°</text>
                </svg>`
            },
            { q: "O - середина AC. AC = 40 см. AO = ?", a: ["10", "20", "30", "40", "80"], c: 1, r: "40 / 2 = 20.",
                svg: `<svg viewBox="0 0 200 60" class="w-full max-w-[200px] h-auto border rounded bg-white p-2">
                    <line x1="20" y1="30" x2="180" y2="30" stroke="black" stroke-width="2" />
                    <circle cx="20" cy="30" r="3" fill="black" />
                    <circle cx="100" cy="30" r="3" fill="red" />
                    <circle cx="180" cy="30" r="3" fill="black" />
                    <text x="15" y="50">A</text><text x="95" y="50">O</text><text x="175" y="50">C</text>
                </svg>`
            },
            { q: "Функція y = log₀.₅x. Яке твердження правильне?", a: ["Зростає", "Парна", "Від'ємна при x=2", "Проходить через (0,0)", "Область значень x>0"], c: 2, r: "log(0.5) від 2 = -1." },
            { q: "Обчисліть |m-4|, якщо m = -1 1/3.", a: ["5 1/3", "2 2/3", "-5 1/3", "4", "5.3"], c: 0, r: "|-5 1/3| = 5 1/3." },
            { q: "f(x)=30 (x<-2), f(x)=2x⁴+x (x≥-2). f(-3)-f'(2)=?", a: ["35", "-35", "15", "-33", "0"], c: 1, r: "30 - 65 = -35." },
            { q: "Вибрати 2 білі троянди (з 12) та 1 червону (з 25). Скільки варіантів?", a: ["300", "1650", "3300", "37", "420"], c: 1, r: "C(12,2)*25 = 1650." },
            { q: "Об'єм призми. Основа ромб (60°), H=8√3. Більший переріз 240√3.", a: ["1200", "2400", "3600", "4800", "2400√3"], c: 2, r: "V = 3600." },
            { q: "Найбільше a, при якому 3ˣ + (4a²+10a)3⁻ˣ = 4a+5 не має коренів.", a: ["-2.5", "0", "-5", "1.25", "2"], c: 0, r: "a = -2.5." }
        ];

        let userAnswers = new Array(quizData.length).fill(null);
        let confirmedAnswers = new Array(quizData.length).fill(false);
        let isFinished = false;
        let timeLeft = 3600;
        let timerInterval;

        function startTest() {
            document.getElementById('intro-card').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            renderProgressPanel();
            renderQuestions();
            startTimer();
        }

        function renderProgressPanel() {
            const panel = document.getElementById('progress-panel');
            panel.innerHTML = '';
            quizData.forEach((_, i) => {
                const box = document.createElement('div');
                box.id = `pb-${i}`;
                box.className = 'progress-box';
                box.innerText = i + 1;
                box.onclick = () => document.getElementById(`question-card-${i}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                panel.appendChild(box);
            });
        }

        function renderQuestions() {
            const list = document.getElementById('questions-list');
            quizData.forEach((item, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = "bg-white rounded-xl p-6 mb-6 custom-shadow border-l-4 border-gray-200";
                qDiv.id = `question-card-${index}`;
                qDiv.innerHTML = `
                    <div class="flex items-start mb-4">
                        <span class="bg-gray-700 text-white w-7 h-7 rounded-md flex items-center justify-center font-bold mr-3 flex-shrink-0 text-sm">${index + 1}</span>
                        <div class="w-full">
                            <p class="text-lg font-medium leading-relaxed mb-4">${item.q}</p>
                            ${item.svg ? `<div class="mb-4 flex justify-center">${item.svg}</div>` : ''}
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-3 mb-5 ml-0 md:ml-10">
                        ${item.a.map((opt, i) => `
                            <button onclick="selectOption(${index}, ${i})" id="q${index}-opt${i}" 
                                class="option-btn text-left p-2 border-2 border-gray-100 rounded-lg transition-all flex items-center">
                                <span class="w-7 h-7 rounded-full border border-blue-200 flex items-center justify-center font-bold text-blue-600 mr-2 bg-white flex-shrink-0 text-xs">${String.fromCharCode(1040 + i)}</span> 
                                <span class="text-sm">${opt}</span>
                            </button>
                        `).join('')}
                    </div>
                    <div class="ml-0 md:ml-10">
                        <button onclick="confirmAnswer(${index})" id="confirm-btn-${index}" 
                            class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-2.5 rounded-lg font-bold shadow-md active:scale-95 transition-all">Відповісти</button>
                    </div>
                    <div id="feedback-area-${index}" class="hidden mt-4 ml-0 md:ml-10 p-4 rounded-lg border-2"></div>
                `;
                list.appendChild(qDiv);
            });
        }

        function selectOption(qIdx, optIdx) {
            if (isFinished || confirmedAnswers[qIdx]) return;
            const optionsCount = quizData[qIdx].a.length;
            for (let i = 0; i < optionsCount; i++) {
                const btn = document.getElementById(`q${qIdx}-opt${i}`);
                btn.classList.remove('border-blue-500', 'bg-blue-50');
                btn.querySelector('span:first-child').classList.remove('bg-blue-600', 'text-white');
            }
            const sel = document.getElementById(`q${qIdx}-opt${optIdx}`);
            sel.classList.add('border-blue-500', 'bg-blue-50');
            sel.querySelector('span:first-child').classList.add('bg-blue-600', 'text-white');
            userAnswers[qIdx] = optIdx;
        }

        function confirmAnswer(index) {
            if (isFinished || userAnswers[index] === null) return;
            confirmedAnswers[index] = true;
            document.getElementById(`pb-${index}`).classList.add('progress-answered');
            const btn = document.getElementById(`confirm-btn-${index}`);
            btn.disabled = true;
            btn.innerText = "Збережено";
            btn.classList.replace('bg-blue-600', 'bg-gray-400');
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) finishTest();
            }, 1000);
        }

        function finishTest() {
            if (isFinished) return;
            isFinished = true;
            clearInterval(timerInterval);
            let score = 0;
            quizData.forEach((item, index) => {
                const isCorrect = userAnswers[index] === item.c;
                if (isCorrect) score++;
                const fb = document.getElementById(`feedback-area-${index}`);
                fb.classList.remove('hidden');
                document.getElementById(`pb-${index}`).classList.remove('progress-answered');
                if (isCorrect) {
                    fb.classList.add('bg-green-50', 'border-green-200');
                    fb.innerHTML = `<p class="text-green-700 font-bold">Правильно!</p><p class="text-sm text-gray-600">${item.r}</p>`;
                    document.getElementById(`pb-${index}`).classList.add('progress-correct');
                } else {
                    fb.classList.add('bg-red-50', 'border-red-200');
                    fb.innerHTML = `<p class="text-red-700 font-bold">Неправильно. Правильна: ${String.fromCharCode(1040 + item.c)}</p><p class="text-sm text-gray-700">${item.r}</p>`;
                    document.getElementById(`pb-${index}`).classList.add('progress-wrong');
                }
            });
            document.getElementById('finish-btn').classList.add('hidden');
            document.getElementById('result-card').classList.remove('hidden');
            document.getElementById('score-display').innerText = `${score} / 22`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
