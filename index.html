<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Раціональні числа</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .math-font { font-family: 'Times New Roman', serif; }
        .fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            font-size: 0.85em;
            line-height: 1.1;
            margin: 0 0.1em;
        }
        .frac-top { border-bottom: 1px solid currentColor; padding: 0 1px; }
        .frac-bottom { padding: 0 1px; }
        .mixed-number { display: inline-flex; align-items: center; }
        
        .custom-select-container { position: relative; width: 100%; }
        .custom-select-trigger {
            width: 100%;
            padding: 0.75rem 1rem;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            min-height: 3.5rem;
        }
        .custom-options {
            position: absolute;
            top: 105%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 50;
            display: none;
            max-height: 300px;
            overflow-y: auto;
        }
        .custom-options.show { display: block; }
        .custom-option {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .custom-option:hover { background-color: #f8fafc; color: #4f46e5; }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: white;
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="app" class="max-w-3xl mx-auto bg-white shadow-2xl overflow-hidden min-h-screen flex flex-col relative">
        
        <!-- Закріплений заголовок (Header) -->
        <header class="sticky-header shadow-md">
            <!-- Верхня синя панель -->
            <div class="bg-indigo-800 p-4 text-white relative">
                <div class="flex items-center justify-between gap-4">
                    <!-- Timer -->
                    <div class="bg-rose-600 px-3 py-1.5 rounded-lg border border-rose-400 shadow-sm flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span id="timer" class="font-mono font-bold text-lg leading-none">30:00</span>
                    </div>

                    <h1 class="text-lg font-black uppercase tracking-tight text-center flex-1 hidden sm:block">Математичний Тренажер</h1>
                    
                    <!-- Progress -->
                    <div class="bg-indigo-900/50 px-3 py-1.5 rounded-lg border border-indigo-400/30 backdrop-blur-sm">
                        <span id="progress-counter" class="font-black text-white text-base">0 / 8</span>
                    </div>
                </div>
            </div>

            <!-- Нижня панель керування -->
            <div class="p-3 border-b bg-indigo-50 flex flex-col md:flex-row gap-3 items-center justify-between">
                <div class="flex items-center gap-3 w-full md:w-auto">
                    <span class="font-bold text-indigo-900 text-sm whitespace-nowrap">Варіант:</span>
                    <div id="variant-tabs" class="flex gap-1">
                        <button onclick="changeVariant(0)" class="v-btn w-9 h-9 rounded-lg font-bold transition-all bg-indigo-600 text-white text-sm shadow-sm">1</button>
                        <button onclick="changeVariant(1)" class="v-btn w-9 h-9 rounded-lg font-bold transition-all bg-white text-indigo-600 border border-indigo-200 text-sm">2</button>
                        <button onclick="changeVariant(2)" class="v-btn w-9 h-9 rounded-lg font-bold transition-all bg-white text-indigo-600 border border-indigo-200 text-sm">3</button>
                        <button onclick="changeVariant(3)" class="v-btn w-9 h-9 rounded-lg font-bold transition-all bg-white text-indigo-600 border border-indigo-200 text-sm">4</button>
                    </div>
                </div>
                
                <div class="w-full md:flex-1 md:max-w-xs">
                    <input type="text" id="user-name" placeholder="Прізвище та ім'я учня" class="w-full px-4 py-2 border-2 border-indigo-200 rounded-xl focus:border-indigo-500 outline-none font-bold text-sm">
                </div>
            </div>
        </header>

        <!-- Questions List -->
        <main id="questions-list" class="p-6 space-y-6 flex-grow bg-white"></main>

        <!-- Footer -->
        <footer class="p-8 border-t bg-gray-50 text-center mb-12">
            <button id="check-btn" onclick="checkResults()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 px-12 rounded-2xl shadow-xl transition-all active:scale-95 text-xl">
                ПЕРЕВІРИТИ РОБОТУ
            </button>
            
            <div id="result-display" class="mt-8 hidden p-8 rounded-3xl border-4 text-center">
                <p id="student-name-result" class="text-2xl font-black text-indigo-900 mb-2"></p>
                <div class="text-5xl font-black mb-2"><span id="score-val">0</span> / 12</div>
                <p id="feedback-msg" class="text-xl font-bold mb-4"></p>
            </div>
        </footer>
    </div>

    <script>
        let timeLeft = 30 * 60;
        let timerId = null;

        function startTimer() {
            if (timerId) clearInterval(timerId);
            timeLeft = 30 * 60;
            updateTimerDisplay();
            timerId = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timeIsUp();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').innerText = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft < 300) {
                document.getElementById('timer').parentElement.classList.replace('bg-rose-600', 'bg-red-700');
            }
        }

        function timeIsUp() {
            document.getElementById('timer').innerText = "00:00";
            checkResults();
        }

        function formatMath(text) {
            if (!text) return "";
            text = text.toString().replace(/\*/g, ' \u22C5 ');
            text = text.replace(/(-?\d+)\s+(\d+)\/(\d+)/g, (m, whole, num, den) => {
                return `<span class="mixed-number">${whole}<span class="fraction"><span class="frac-top">${num}</span><span class="frac-bottom">${den}</span></span></span>`;
            });
            text = text.replace(/(-?)(\d+)\/(\d+)/g, (m, sign, num, den) => {
                return `${sign}<span class="fraction"><span class="frac-top">${num}</span><span class="frac-bottom">${den}</span></span>`;
            });
            return text;
        }

        const variants = [
            {
                questions: [
                    { type: 'input', q: '(-3)\u00B2 + (-5)', a: '4', weight: 0.5 },
                    { type: 'input', q: '-7,5 - 2,5 + 4', a: '-6', weight: 0.5 },
                    { type: 'select', q: '-3/8 + 1/2', a: '1/8', options: ['-1/8', '1/8', '4/10', '-5/8'], weight: 1 },
                    { type: 'select', q: '1 1/3 * (-0,75)', a: '-1', options: ['-1', '1', '-1 1/4', '1/2'], weight: 1 },
                    { type: 'input', q: '-4,5 * 2 + 12,6 : (-3) - 1,4', a: '-14,6', weight: 2 },
                    { type: 'input', q: '-10 : 2,5 - 4,8 * (-0,5) + 3,6', a: '2', weight: 2 },
                    { type: 'select', q: '-1/2 * 4/5 + 3/10 : (-1/5) - 1/4', a: '-2 3/20', options: ['-1 1/2', '-2 1/10', '-2 3/20', '-1 17/20'], weight: 2 },
                    { type: 'select', q: '-2 1/4 : 3/4 - 5/6 * (-12/25) + 1 1/2', a: '-1 1/10', options: ['-1 1/10', '-2', '1', '1/2'], weight: 3 }
                ]
            },
            {
                questions: [
                    { type: 'input', q: '(-2)\u00B3 - 2', a: '-10', weight: 0.5 },
                    { type: 'input', q: '-3,2 - 6,8 + 15', a: '5', weight: 0.5 },
                    { type: 'select', q: '-5/6 + 1/3', a: '-1/2', options: ['-1/2', '1/2', '-1/6', '-1/3'], weight: 1 },
                    { type: 'select', q: '2 1/4 * (-4/9)', a: '-1', options: ['1', '-1', '-2', '-1/2'], weight: 1 },
                    { type: 'input', q: '15,8 - 2,4 : 0,6 + (-5,2) * 3', a: '-3,8', weight: 2 },
                    { type: 'input', q: '7,2 : (-0,9) + 5,4 - 2,1 * 4', a: '-11', weight: 2 },
                    { type: 'select', q: '1 1/2 - 3/4 : 1/8 + (-2/3) * 6', a: '-8,5', options: ['-8,5', '-7,5', '-10', '4,5'], weight: 2 },
                    { type: 'select', q: '4/9 : (-2/3) + 5/6 - 1/3 * 4', a: '-1 1/6', options: ['-1 1/6', '1/6', '-1', '1 1/3'], weight: 3 }
                ]
            },
            {
                questions: [
                    { type: 'input', q: '(-1)\u00B3 + 1', a: '0', weight: 0.5 },
                    { type: 'input', q: '-12,4 + 2,4 - 5', a: '-15', weight: 0.5 },
                    { type: 'select', q: '-1/4 + 5/8', a: '3/8', options: ['3/8', '-3/8', '1/2', '4/8'], weight: 1 },
                    { type: 'select', q: '1 2/3 * (-0,6)', a: '-1', options: ['-1', '1', '-3/5', '-1 1/5'], weight: 1 },
                    { type: 'input', q: '-3,5 * (-2) - 18,9 : 0,9 + 11', a: '-3', weight: 2 },
                    { type: 'input', q: '-8,1 : 0,9 - 5,6 : (-0,7) + 12', a: '11', weight: 2 },
                    { type: 'select', q: '-1 2/3 * (-3) - 4 1/2 : 1/2 + 5', a: '1', options: ['1', '-1', '10', '0'], weight: 2 },
                    { type: 'select', q: '-8/15 : 4/5 - 2/3 : (-4/9) + 2', a: '2 5/6', options: ['2 5/6', '1 1/2', '2', '3'], weight: 3 }
                ]
            },
            {
                questions: [
                    { type: 'input', q: '(-4)\u00B2 - 20', a: '-4', weight: 0.5 },
                    { type: 'input', q: '-10,5 + 5,5 - 2', a: '-7', weight: 0.5 },
                    { type: 'select', q: '-2/9 + 1/3', a: '1/9', options: ['1/9', '-1/9', '1/3', '-1/6'], weight: 1 },
                    { type: 'select', q: '1 1/5 * (-5)', a: '-6', options: ['-6', '6', '-5', '-5 1/2'], weight: 1 },
                    { type: 'input', q: '9,3 - 12,6 : (-0,6) + 5 * (-1,2)', a: '24,3', weight: 2 },
                    { type: 'input', q: '-4 * (-2,5 + 6,3 : 0,9)', a: '-18', weight: 2 },
                    { type: 'select', q: '4 2/3 - 6 : (-1/2) + 3 * (-1 1/3)', a: '12 2/3', options: ['12 2/3', '8 1/3', '-4', '10'], weight: 2 },
                    { type: 'select', q: '-2 * (-1 1/4 + 2 1/2 : 1/2)', a: '-7 1/2', options: ['-7 1/2', '7 1/2', '-5', '-10'], weight: 3 }
                ]
            }
        ];

        let currentVariantIndex = 0;
        let userAnswers = {};

        function updateProgress() {
            const qs = variants[currentVariantIndex].questions;
            let answeredCount = 0;
            qs.forEach((item, index) => {
                if (item.type === 'input') {
                    const el = document.querySelector(`input[data-index="${index}"]`);
                    if (el && el.value.trim() !== "") answeredCount++;
                } else {
                    if (userAnswers[index]) answeredCount++;
                }
            });
            document.getElementById('progress-counter').innerText = `${answeredCount} / ${qs.length}`;
        }

        function renderQuestions() {
            const container = document.getElementById('questions-list');
            container.innerHTML = '';
            userAnswers = {};
            const qs = variants[currentVariantIndex].questions;

            qs.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:border-indigo-400 transition-all";
                
                let answerHtml = '';
                if (item.type === 'input') {
                    answerHtml = `<input type="text" data-index="${index}" oninput="updateProgress()" placeholder="Введіть число" class="q-input w-full mt-4 p-3 border-2 rounded-xl focus:border-indigo-600 outline-none font-bold text-center text-lg">`;
                } else {
                    answerHtml = `
                        <div class="custom-select-container mt-4" data-index="${index}">
                            <div class="custom-select-trigger math-font" onclick="toggleDropdown(${index})">
                                <span id="trigger-text-${index}">Оберіть відповідь</span>
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                            <div class="custom-options math-font" id="options-${index}">
                                ${item.options.map(opt => `
                                    <div class="custom-option" onclick="selectOption(${index}, '${opt}')">
                                        ${formatMath(opt)}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex items-center gap-2 mb-4">
                        <span class="bg-indigo-100 text-indigo-800 text-xs font-black px-2.5 py-1 rounded-lg uppercase tracking-wider">№${index + 1}</span>
                        <span class="text-[10px] text-slate-400 font-black uppercase tracking-widest">${item.weight} БАЛ${item.weight === 1 ? '' : (item.weight === 0.5 ? 'А' : 'И')}</span>
                    </div>
                    <div class="text-2xl text-slate-800 math-font flex items-center flex-wrap gap-2">
                        ${formatMath(item.q)} <span class="text-indigo-400 font-sans">=</span> <span class="text-slate-300">?</span>
                    </div>
                    ${answerHtml}
                    <div id="msg-${index}" class="mt-4 p-3 rounded-lg text-sm font-bold hidden"></div>
                `;
                container.appendChild(card);
            });
            updateProgress();
            startTimer();
        }

        function toggleDropdown(idx) {
            const options = document.getElementById(`options-${idx}`);
            const isShown = options.classList.contains('show');
            document.querySelectorAll('.custom-options').forEach(el => el.classList.remove('show'));
            if (!isShown) options.classList.add('show');
        }

        function selectOption(idx, val) {
            userAnswers[idx] = val;
            const triggerText = document.getElementById(`trigger-text-${idx}`);
            triggerText.innerHTML = formatMath(val);
            document.getElementById(`options-${idx}`).classList.remove('show');
            updateProgress();
        }

        function changeVariant(idx) {
            currentVariantIndex = idx;
            document.querySelectorAll('.v-btn').forEach((btn, i) => {
                btn.className = i === idx 
                    ? "v-btn w-9 h-9 rounded-lg font-bold transition-all bg-indigo-600 text-white shadow-sm"
                    : "v-btn w-9 h-9 rounded-lg font-bold transition-all bg-white text-indigo-600 border border-indigo-200";
            });
            document.getElementById('result-display').classList.add('hidden');
            document.getElementById('check-btn').classList.remove('hidden');
            renderQuestions();
        }

        function normalizeValue(val) {
            if (!val) return "";
            return val.toString().trim().replace(',', '.');
        }

        function checkResults() {
            const userName = document.getElementById('user-name').value.trim();
            if (!userName) {
                const nameInput = document.getElementById('user-name');
                nameInput.classList.add('border-rose-500', 'shake');
                nameInput.focus();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                setTimeout(() => nameInput.classList.remove('shake'), 500);
                return;
            }

            clearInterval(timerId);
            const qs = variants[currentVariantIndex].questions;
            let score = 0;

            qs.forEach((item, index) => {
                const msg = document.getElementById(`msg-${index}`);
                let userVal = "";
                
                if (item.type === 'input') {
                    const el = document.querySelector(`input[data-index="${index}"]`);
                    userVal = normalizeValue(el?.value);
                    if(el) el.disabled = true;
                } else {
                    userVal = normalizeValue(userAnswers[index]);
                    const trig = document.querySelector(`.custom-select-container[data-index="${index}"] .custom-select-trigger`);
                    if(trig) trig.style.pointerEvents = 'none';
                }

                const correctVal = normalizeValue(item.a);

                if (msg) {
                    msg.classList.remove('hidden');
                    if (userVal === correctVal) {
                        score += item.weight;
                        msg.innerHTML = `✓ ПРАВИЛЬНО (+${item.weight})`;
                        msg.className = "mt-4 p-3 rounded-xl text-xs font-black bg-emerald-50 text-emerald-600 border border-emerald-100";
                    } else {
                        msg.innerHTML = `✗ НЕПРАВИЛЬНО. Правильно: <span class="math-font">${formatMath(item.a.toString().replace('.', ','))}</span>`;
                        msg.className = "mt-4 p-3 rounded-xl text-xs font-black bg-rose-50 text-rose-600 border border-rose-100";
                    }
                }
            });

            document.getElementById('user-name').disabled = true;
            const resultDiv = document.getElementById('result-display');
            document.getElementById('score-val').innerText = score % 1 === 0 ? score : score.toFixed(1);
            document.getElementById('student-name-result').innerText = userName;
            
            const feedback = document.getElementById('feedback-msg');
            resultDiv.classList.remove('hidden');
            document.getElementById('check-btn').classList.add('hidden');

            if (score >= 10) {
                resultDiv.className = "mt-8 p-8 rounded-3xl border-4 border-emerald-500 bg-emerald-50 text-emerald-900 shadow-inner";
                feedback.innerText = "ВІДМІННО! Високий рівень знань.";
            } else if (score >= 7) {
                resultDiv.className = "mt-8 p-8 rounded-3xl border-4 border-amber-500 bg-amber-50 text-amber-900 shadow-inner";
                feedback.innerText = "ДОБРЕ. Але зверніть увагу на помилки.";
            } else {
                resultDiv.className = "mt-8 p-8 rounded-3xl border-4 border-rose-500 bg-rose-50 text-rose-900 shadow-inner";
                feedback.innerText = "ПОТРІБНО ПОВТОРИТИ ПРАВИЛА!";
            }

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        window.onclick = function(event) {
            if (!event.target.closest('.custom-select-container')) {
                document.querySelectorAll('.custom-options').forEach(el => el.classList.remove('show'));
            }
        }

        window.onload = renderQuestions;
    </script>
</body>
</html>
